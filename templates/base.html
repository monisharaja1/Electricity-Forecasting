<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ title or "Electricity Demand App" }}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Sora:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
    <div class="ambient-bg" aria-hidden="true"></div>
    <header class="topbar">
        <div class="container topbar-inner">
            <a href="/" class="brand"><i class="fa-solid fa-bolt"></i> SmartGrid</a>
            <button class="menu-btn" id="menuBtn" aria-label="Toggle menu">
                <i class="fa-solid fa-bars"></i>
            </button>
            <nav class="nav" id="mainNav">
                <a href="/" class="{% if active_page == 'home' %}active{% endif %}">Home</a>
                <a href="/realtime" class="{% if active_page == 'realtime' %}active{% endif %}">Realtime</a>
                <a href="/forecast" class="{% if active_page == 'forecast' %}active{% endif %}">Forecast</a>
                <a href="/history" class="{% if active_page == 'history' %}active{% endif %}">History</a>
                <a href="/dashboard" class="{% if active_page == 'dashboard' %}active{% endif %}">Dashboard</a>
            </nav>
            <div class="theme-switch">
                <input type="checkbox" id="theme-toggle" class="theme-toggle-checkbox">
                <label for="theme-toggle" class="theme-toggle-label">
                    <i class="fa-solid fa-moon"></i>
                    <i class="fa-solid fa-sun"></i>
                </label>
            </div>
        </div>
    </header>

    <main class="container page">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="container">
            <small>SmartGrid Energy Intelligence Platform</small>
        </div>
    </footer>

    <script src="{{ url_for('static', filename='js/app-ui.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
